<!-- BOTÃO HAMBÚRGUER NO CELULAR -->

<button
  type="button"
  class="menu-hamburguer"
  [class.oculto]="menuAberto"
  aria-label="Abrir menu"
  (click)="toggleMenu()">

  <i class="fa-solid fa-bars"></i>

</button>

<!-- FUNDO ESCURO QUANDO O MENU ABRIR NO CELULAR -->

<div
  class="sidebar-overlay"
  *ngIf="telaMobile && menuAberto"
  (click)="fecharMenuMobile()">
</div>

<!-- SIDEBAR -->

<div
  class="sidebar"
  [class.closed]="!menuAberto"
  [class.mobile-aberta]="telaMobile && menuAberto">

  <!-- TOPO -->

  <div class="sidebar-top">

    <div class="logo">

      <i class="fa-solid fa-recycle"></i>

      <span>EcoCycle</span>

    </div>

    <button
      type="button"
      class="toggle"
      aria-label="Fechar ou recolher menu"
      (click)="toggleMenu()">

      <i
        class="fa-solid"
        [ngClass]="telaMobile
          ? 'fa-xmark'
          : 'fa-chevron-left'"
        [class.girar]="!menuAberto && !telaMobile">
      </i>

    </button>

  </div>

  <!-- PERFIL -->

  <div class="profile">

    <small>PERFIL</small>

    <h3>
      {{ perfil | titlecase }}
    </h3>

  </div>

  <!-- MENU -->

  <div class="menu">

    <!-- GERADOR -->

    <ng-container *ngIf="perfil === 'gerador'">

      <a
        routerLink="/gerador/dashboard"
        routerLinkActive="ativo"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="fecharMenuMobile()">

        <i class="fa-solid fa-chart-line"></i>

        <span>Dashboard</span>

      </a>

      <a
        routerLink="/gerador/solicitar-coleta"
        routerLinkActive="ativo"
        (click)="fecharMenuMobile()">

        <i class="fa-solid fa-truck"></i>

        <span>Solicitar Coleta</span>

      </a>

      <a
        routerLink="/gerador/incentivos-fiscais"
        routerLinkActive="ativo"
        (click)="fecharMenuMobile()">

        <i class="fa-solid fa-coins"></i>

        <span>Incentivos Fiscais</span>

      </a>

      <a
        routerLink="/gerador/selos-certificados"
        routerLinkActive="ativo"
        (click)="fecharMenuMobile()">

        <i class="fa-solid fa-award"></i>

        <span>Selos & Certificados</span>

      </a>

    </ng-container>

    <!-- COOPERATIVA -->

    <ng-container *ngIf="perfil === 'cooperativa'">

      <a
        routerLink="/cooperativa/dashboard"
        routerLinkActive="ativo"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="fecharMenuMobile()">

        <i class="fa-solid fa-chart-line"></i>

        <span>Dashboard</span>

      </a>

      <a
        routerLink="/cooperativa/match-emapa"
        routerLinkActive="ativo"
        (click)="fecharMenuMobile()">

        <i class="fa-solid fa-map-location-dot"></i>

        <span>Match & Mapa</span>

      </a>

      <a
        routerLink="/cooperativa/frota"
        routerLinkActive="ativo"
        (click)="fecharMenuMobile()">

        <i class="fa-solid fa-truck-fast"></i>

        <span>Frota</span>

      </a>

      <a
        routerLink="/cooperativa/coletas"
        routerLinkActive="ativo"
        (click)="fecharMenuMobile()">

        <i class="fa-solid fa-box"></i>

        <span>Coletas</span>

      </a>

    </ng-container>

    <!-- RECICLADORA -->

    <ng-container *ngIf="perfil === 'recicladora'">

      <a
        routerLink="/recicladora/dashboard"
        routerLinkActive="ativo"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="fecharMenuMobile()">

        <i class="fa-solid fa-chart-line"></i>

        <span>Dashboard</span>

      </a>

      <a
        routerLink="/recicladora/recebimentos"
        routerLinkActive="ativo"
        (click)="fecharMenuMobile()">

        <i class="fa-solid fa-warehouse"></i>

        <span>Recebimentos</span>

      </a>

      <a
        routerLink="/recicladora/controle-de-volume"
        routerLinkActive="ativo"
        (click)="fecharMenuMobile()">

        <i class="fa-solid fa-weight-scale"></i>

        <span>Controle de Volume</span>

      </a>

    </ng-container>

  </div>

  <!-- RODAPÉ -->

  <div class="sidebar-footer">

    <a
      routerLink="/perfil"
      routerLinkActive="ativo"
      (click)="fecharMenuMobile()">

      <i class="fa-regular fa-user"></i>

      <span>Perfil</span>

    </a>

    <button
      type="button"
      class="botao-sair"
      (click)="sair()">

      <i class="fa-solid fa-arrow-right-from-bracket"></i>

      <span>Sair</span>

    </button>

  </div>

</div>
